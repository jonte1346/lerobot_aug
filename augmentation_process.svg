<svg width="100%" viewBox="0 0 680 840" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: sans-serif; }
    .th { font-size: 14px; font-weight: 500; }
    .ts { font-size: 12px; }
    .c-gray > rect { fill: #F1EFE8; stroke: #5F5E5A; stroke-width: 0.5; }
    .c-gray .th { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }
    .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.5; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.5; }
    .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }
    .c-amber > rect { fill: #FAEEDA; stroke: #854F0B; stroke-width: 0.5; }
    .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }
    .c-coral > rect { fill: #FAECE7; stroke: #993C1D; stroke-width: 0.5; }
    .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }
    .c-red > rect { fill: #FCEBEB; stroke: #A32D2D; stroke-width: 0.5; }
    .c-red .th { fill: #791F1F; }
    .c-red .ts { fill: #A32D2D; }
  </style>
</defs>

<!-- Source -->
<g class="c-gray">
  <rect x="190" y="20" width="300" height="44" rx="8"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Source dataset</text>
</g>

<!-- Two source arrows offset from centre -->
<line x1="310" y1="64" x2="230" y2="100" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="370" y1="64" x2="480" y2="100" stroke="#B4B2A9" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Pre-filter gate -->
<g class="c-teal">
  <rect x="130" y="104" width="200" height="56" rx="8"/>
  <text class="th" x="230" y="125" text-anchor="middle" dominant-baseline="central">Pre-filter gate</text>
  <text class="ts" x="230" y="145" text-anchor="middle" dominant-baseline="central">SPARC · saturation · jerk</text>
</g>

<!-- Reject -->
<line x1="130" y1="132" x2="82" y2="132" stroke="#B4B2A9" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<g class="c-red">
  <rect x="20" y="114" width="62" height="36" rx="6"/>
  <text class="ts" x="51" y="132" text-anchor="middle" dominant-baseline="central">reject</text>
</g>

<!-- Episode scorer -->
<g class="c-gray">
  <rect x="370" y="104" width="220" height="56" rx="8"/>
  <text class="th" x="480" y="125" text-anchor="middle" dominant-baseline="central">Episode scorer</text>
  <text class="ts" x="480" y="145" text-anchor="middle" dominant-baseline="central">blur · smoothness · SPARC</text>
</g>

<!-- Scorer straight down to post-aug quality check top -->
<line x1="480" y1="160" x2="480" y2="556" stroke="#B4B2A9" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Pre-filter bottom-centre → aug layer -->
<line x1="230" y1="160" x2="230" y2="196" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Augmentation layer -->
<g class="c-purple">
  <rect x="80" y="200" width="520" height="56" rx="8"/>
  <text class="th" x="340" y="221" text-anchor="middle" dominant-baseline="central">Augmentation layer</text>
  <text class="ts" x="340" y="241" text-anchor="middle" dominant-baseline="central">visual · temporal · action-space</text>
</g>

<!-- Fan arrows straight down to child top-centres -->
<line x1="144" y1="256" x2="144" y2="312" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="256" x2="340" y2="312" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="536" y1="256" x2="536" y2="312" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Visual aug  x=51 w=186 centre=144 -->
<g class="c-amber">
  <rect x="51" y="316" width="186" height="100" rx="8"/>
  <text class="th" x="144" y="339" text-anchor="middle" dominant-baseline="central">Visual aug</text>
  <text class="ts" x="144" y="359" text-anchor="middle" dominant-baseline="central">color jitter · blur</text>
  <text class="ts" x="144" y="377" text-anchor="middle" dominant-baseline="central">sharpness · erasing</text>
  <text class="ts" x="144" y="395" text-anchor="middle" dominant-baseline="central">hflip + action mirror</text>
</g>

<!-- Temporal aug  x=247 w=186 centre=340 -->
<g class="c-purple">
  <rect x="247" y="316" width="186" height="100" rx="8"/>
  <text class="th" x="340" y="339" text-anchor="middle" dominant-baseline="central">Temporal aug</text>
  <text class="ts" x="340" y="359" text-anchor="middle" dominant-baseline="central">keep_every_n · action_shift</text>
  <text class="ts" x="340" y="377" text-anchor="middle" dominant-baseline="central">stride cycling · tail drop</text>
  <text class="ts" x="340" y="395" text-anchor="middle" dominant-baseline="central">jitter ±15%</text>
</g>

<!-- Action-space aug  x=443 w=186 centre=536 -->
<g class="c-teal">
  <rect x="443" y="316" width="186" height="100" rx="8"/>
  <text class="th" x="536" y="339" text-anchor="middle" dominant-baseline="central">Action-space aug</text>
  <text class="ts" x="536" y="359" text-anchor="middle" dominant-baseline="central">Gaussian noise</text>
  <text class="ts" x="536" y="377" text-anchor="middle" dominant-baseline="central">Savitzky-Golay smooth</text>
  <text class="ts" x="536" y="395" text-anchor="middle" dominant-baseline="central">grippers excluded</text>
</g>

<!-- Merge arrows to metadata sync top-centre 340,460 -->
<line x1="144" y1="416" x2="280" y2="456" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="340" y1="416" x2="340" y2="456" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
<line x1="536" y1="416" x2="400" y2="456" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Metadata sync -->
<g class="c-teal">
  <rect x="220" y="460" width="240" height="56" rx="8"/>
  <text class="th" x="340" y="481" text-anchor="middle" dominant-baseline="central">Metadata sync</text>
  <text class="ts" x="340" y="499" text-anchor="middle" dominant-baseline="central">Parquet reindex · jsonl update</text>
</g>

<!-- SAM3 optional -->
<g class="c-coral">
  <rect x="20" y="460" width="160" height="56" rx="8"/>
  <text class="th" x="100" y="481" text-anchor="middle" dominant-baseline="central">SAM3 masks</text>
  <text class="ts" x="100" y="499" text-anchor="middle" dominant-baseline="central">background replace</text>
</g>
<line x1="180" y1="488" x2="216" y2="488" stroke="#B4B2A9" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Metadata sync bottom → quality check top -->
<line x1="340" y1="516" x2="340" y2="556" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- Post-aug quality check -->
<g class="c-gray">
  <rect x="160" y="560" width="360" height="56" rx="8"/>
  <text class="th" x="340" y="581" text-anchor="middle" dominant-baseline="central">Post-aug quality check</text>
  <text class="ts" x="340" y="599" text-anchor="middle" dominant-baseline="central">SPARC delta · action diversity · jerk</text>
</g>

<line x1="340" y1="616" x2="340" y2="652" stroke="#888780" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

<!-- HF Hub -->
<g class="c-gray">
  <rect x="200" y="656" width="280" height="44" rx="8"/>
  <text class="th" x="340" y="678" text-anchor="middle" dominant-baseline="central">HF Hub + visualizer</text>
</g>

<!-- Legend -->
<rect x="40" y="726" width="600" height="94" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="56" y="740" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts" x="76" y="748" dominant-baseline="central" fill="#5F5E5A">filter / quality</text>
<rect x="56" y="762" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="76" y="770" dominant-baseline="central" fill="#5F5E5A">temporal</text>
<rect x="56" y="784" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="76" y="792" dominant-baseline="central" fill="#5F5E5A">visual aug</text>
<rect x="200" y="740" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="220" y="748" dominant-baseline="central" fill="#5F5E5A">experimental / optional</text>
<rect x="200" y="762" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="ts" x="220" y="770" dominant-baseline="central" fill="#5F5E5A">source / neutral</text>
<line x1="200" y1="791" x2="214" y2="791" stroke="#B4B2A9" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
<text class="ts" x="220" y="792" dominant-baseline="central" fill="#5F5E5A">optional / side path</text>
</svg>