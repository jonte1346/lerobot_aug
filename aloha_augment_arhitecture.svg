<svg width="100%" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: sans-serif; fill: #1a1a1a; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
      .leader { stroke: #888780; stroke-width: 0.5; stroke-dasharray: 4 3; fill: none; }

      /* c-gray */
      .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray .th { fill: #444441; }
      .c-gray .ts { fill: #5F5E5A; }

      /* c-teal */
      .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal .th { fill: #085041; }
      .c-teal .ts { fill: #0F6E56; }

      /* c-red */
      .c-red rect, .c-red circle, .c-red ellipse { fill: #FCEBEB; stroke: #A32D2D; }
      .c-red .th { fill: #791F1F; }
      .c-red .ts { fill: #A32D2D; }

      /* c-purple */
      .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple .th { fill: #3C3489; }
      .c-purple .ts { fill: #534AB7; }

      /* c-amber */
      .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber .th { fill: #633806; }
      .c-amber .ts { fill: #854F0B; }

      /* c-coral */
      .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #FAECE7; stroke: #993C1D; }
      .c-coral .th { fill: #712B13; }
      .c-coral .ts { fill: #993C1D; }

      /* c-blue */
      .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue .th { fill: #0C447C; }
      .c-blue .ts { fill: #185FA5; }

      /* c-green */
      .c-green rect, .c-green circle, .c-green ellipse { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green .th { fill: #27500A; }
      .c-green .ts { fill: #3B6D11; }
    </style>
  </defs>

  <!-- Row 0: Source -->
  <g class="c-gray">
    <rect x="220" y="20" width="240" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">aloha_static_cups_open</text>
  </g>

  <!-- Arrow down -->
  <line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

  <!-- Row 1: Pre-filter -->
  <g class="c-teal">
    <rect x="140" y="100" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="122" text-anchor="middle" dominant-baseline="central">Pre-filter gate</text>
    <text class="ts" x="240" y="142" text-anchor="middle" dominant-baseline="central">SPARC + actuator saturation</text>
  </g>

  <!-- Reject branch -->
  <line x1="140" y1="128" x2="80" y2="128" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3" stroke="#888780"/>
  <g class="c-red">
    <rect x="20" y="108" width="60" height="40" rx="6" stroke-width="0.5"/>
    <text class="ts" x="50" y="128" text-anchor="middle" dominant-baseline="central">Rejected</text>
  </g>

  <!-- Arrow down from pre-filter -->
  <line x1="240" y1="156" x2="240" y2="195" class="arr" marker-end="url(#arrow)"/>
  <!-- Arrow to existing scorer -->
  <line x1="340" y1="128" x2="460" y2="128" class="arr" marker-end="url(#arrow)"/>

  <!-- Row 1b: existing scorer -->
  <g class="c-gray">
    <rect x="380" y="100" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="480" y="122" text-anchor="middle" dominant-baseline="central">Existing scorer</text>
    <text class="ts" x="480" y="142" text-anchor="middle" dominant-baseline="central">blur, smoothness, collision</text>
  </g>

  <!-- Label above augmentation layer -->
  <text class="ts" x="240" y="208" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">quality-gated episodes</text>
  <line x1="240" y1="216" x2="240" y2="230" class="arr" marker-end="url(#arrow)"/>

  <!-- Row 2: Augmentation layer -->
  <g class="c-purple">
    <rect x="80" y="230" width="320" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="252" text-anchor="middle" dominant-baseline="central">Augmentation layer</text>
    <text class="ts" x="240" y="271" text-anchor="middle" dominant-baseline="central">visual · temporal · text relabeling</text>
  </g>

  <!-- Three arrows to children -->
  <line x1="140" y1="286" x2="90" y2="330" class="arr" marker-end="url(#arrow)"/>
  <line x1="240" y1="286" x2="240" y2="330" class="arr" marker-end="url(#arrow)"/>
  <line x1="360" y1="286" x2="380" y2="330" class="arr" marker-end="url(#arrow)"/>

  <!-- Visual aug -->
  <g class="c-amber">
    <rect x="10" y="330" width="150" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="90" y="352" text-anchor="middle" dominant-baseline="central">Visual aug</text>
    <text class="ts" x="90" y="370" text-anchor="middle" dominant-baseline="central">jitter, occlusion, AugLab</text>
  </g>

  <!-- SAM3 masks -->
  <g class="c-coral">
    <rect x="160" y="330" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="352" text-anchor="middle" dominant-baseline="central">SAM3 masks</text>
    <text class="ts" x="240" y="370" text-anchor="middle" dominant-baseline="central">bg replace, object track</text>
  </g>

  <!-- Text relabeling -->
  <g class="c-blue">
    <rect x="320" y="330" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="400" y="352" text-anchor="middle" dominant-baseline="central">Text relabeling</text>
    <text class="ts" x="400" y="370" text-anchor="middle" dominant-baseline="central">LeSynthesis + text_gen</text>
  </g>

  <!-- Merge back to metadata sync -->
<line x1="120" y1="386" x2="240" y2="430" class="arr" marker-end="url(#arrow)"/>
<line x1="240" y1="386" x2="240" y2="430" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="386" x2="240" y2="430" class="arr" marker-end="url(#arrow)"/>

  <!-- Metadata sync -->
  <g class="c-teal">
    <rect x="120" y="430" width="240" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="452" text-anchor="middle" dominant-baseline="central">Metadata sync</text>
    <text class="ts" x="240" y="470" text-anchor="middle" dominant-baseline="central">Parquet reindex, jsonl update</text>
  </g>

  <!-- Arrow down -->
  <line x1="240" y1="486" x2="240" y2="520" class="arr" marker-end="url(#arrow)"/>

  <!-- Post-aug quality check -->
  <g class="c-green">
    <rect x="100" y="520" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="542" text-anchor="middle" dominant-baseline="central">Post-aug quality check</text>
    <text class="ts" x="240" y="560" text-anchor="middle" dominant-baseline="central">distribution shift, CLIP, coverage</text>
  </g>

  <!-- Arrow down -->
  <line x1="240" y1="576" x2="240" y2="610" class="arr" marker-end="url(#arrow)"/>

  <!-- HF Hub -->
  <g class="c-gray">
    <rect x="140" y="610" width="200" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="240" y="632" text-anchor="middle" dominant-baseline="central">HF Hub + visualizer</text>
  </g>

  <!-- Dashed line from existing scorer feeding into post-aug check -->
  <line x1="480" y1="156" x2="480" y2="548" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3"/>
  <line x1="480" y1="548" x2="382" y2="548" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3" stroke="#B4B2A9"/>
  <text class="ts" x="490" y="356" text-anchor="start" fill="#5F5E5A">feeds into</text>
  <text class="ts" x="490" y="370" text-anchor="start" fill="#5F5E5A">post-aug check</text>

  <!-- Legend box -->
  <rect x="500" y="430" width="160" height="130" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
  <text class="ts" x="510" y="450" fill="#444441">New in this repo</text>
  <g class="c-teal"><rect x="510" y="458" width="12" height="12" rx="2"/></g>
  <text class="ts" x="528" y="469" fill="#5F5E5A">pre-filter / sync</text>
  <g class="c-purple"><rect x="510" y="476" width="12" height="12" rx="2"/></g>
  <text class="ts" x="528" y="487" fill="#5F5E5A">augmentation</text>
  <g class="c-coral"><rect x="510" y="494" width="12" height="12" rx="2"/></g>
  <text class="ts" x="528" y="505" fill="#5F5E5A">SAM3 masks</text>
  <text class="ts" x="510" y="522" fill="#444441">From existing repos</text>
  <g class="c-gray"><rect x="510" y="530" width="12" height="12" rx="2"/></g>
  <text class="ts" x="528" y="541" fill="#5F5E5A">score_lerobot_eps</text>
  <g class="c-blue"><rect x="510" y="548" width="12" height="12" rx="2"/></g>
  <text class="ts" x="528" y="559" fill="#5F5E5A">LeSynthesis</text>
</svg>